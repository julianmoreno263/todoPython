{% extends "base.html"%}
{% block title %}Registrar Usuario{% endblock %}

{% block content %}

<h1>Registrar Usuario</h1>

<form action="" method="post">
    {{form.hidden_tag()}}
    {{form.username.label}} {{form.username}}
    {{form.password.label}} {{form.password}}
    {{form.submit}} 

</form>

{% if error %}
    <p style="color: crimson;">{{error}}</p>
{% endif %}

{% endblock %}
